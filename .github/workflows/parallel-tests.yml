name: Parallel Tests (6 Jobs)

on:
  push:
    branches: [ main ]
  workflow_dispatch:  # Cho phép trigger manual

jobs:
  test:
    name: Test (${{ matrix.os }}, Py${{ matrix.python }})
    runs-on: ${{ matrix.os }}
    
    strategy:
      fail-fast: false  # Không dừng khi 1 job fail
      matrix:
        os: [ubuntu-22.04, windows-latest, macos-latest]
        python: ['3.10', '3.11']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python ${{ matrix.python }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      
      - name: Run tests
        run: pytest tests/ -n auto --html=report-${{ matrix.os }}-py${{ matrix.python }}.html --self-contained-html -v
      
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: results-${{ matrix.os }}-py${{ matrix.python }}
          path: report-*.html
          retention-days: 7

  # Job để aggregate results
  summary:
    name: Test Summary
    needs: test
    runs-on: ubuntu-latest
    if: always()
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
      
      - name: Display summary
        run: |
          echo ""## Test Results Summary"" >> $GITHUB_STEP_SUMMARY
          echo """" >> $GITHUB_STEP_SUMMARY
          echo ""Total jobs: 6 (3 OS × 2 Python)"" >> $GITHUB_STEP_SUMMARY
          echo ""Status: ${{ needs.test.result }}"" >> $GITHUB_STEP_SUMMARY

    # Update workflow để cache dependencies
    