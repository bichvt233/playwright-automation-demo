name: Tests with Slack Notifications

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-22.04
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Install Playwright browsers
        run: python -m playwright install --with-deps chromium
      
      # Run tests và lưu kết quả
      - name: Run Playwright tests
        id: tests  # ID để reference ở bước sau
        run: pytest tests/ --html=reports/test-report.html --self-contained-html -v
        continue-on-error: true  # Không fail job nếu tests fail
      
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: reports/
      
      # Send Slack notification - SUCCESS
      - name: Send Slack notification (Success)
        if: steps.tests.outcome == 'success'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "✅ Tests PASSED - ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nAuthor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl --fail -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"
      
      # Send Slack notification - FAILURE
      - name: Send Slack notification (Failure)
        if: steps.tests.outcome == 'failure'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          payload=$(cat <<'JSON'
          {
            "text": "❌ Tests FAILED - ${{ github.repository }}\nBranch: ${{ github.ref_name }}\nAuthor: ${{ github.actor }}\nRun: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          }
          JSON
          )
          curl --fail -X POST -H "Content-type: application/json" --data "$payload" "$SLACK_WEBHOOK_URL"